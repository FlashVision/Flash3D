version: "3.8"

services:
  flash3d:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: flash3d:latest
    container_name: flash3d
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
    ports:
      - "8888:8888"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  flash3d-train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: flash3d:latest
    container_name: flash3d-train
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
      - ../configs:/app/configs
    command: python -m flash3d.cli train --config configs/flash3d_gaussian_splatting.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
